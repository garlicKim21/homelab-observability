# =============================================================================
# Basphere Observability - Docker Compose
# Phase 1: Core Stack (VictoriaMetrics + vmalert + Alertmanager + Grafana)
# Phase 2: ESXi Monitoring (Telegraf vSphere → vCenter API)
# Phase 4: Network Devices (snmp_exporter → SG2218, NAS, AP)
# Phase 5: Log Aggregation (Loki + Promtail syslog receiver)
# Phase 6: Application Log Collection (Docker + Host logs)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # VictoriaMetrics - 시계열 데이터베이스 (Prometheus 호환 TSDB)
  # ---------------------------------------------------------------------------
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    container_name: victoriametrics
    restart: unless-stopped
    mem_limit: 1536m
    cpus: 1.5
    dns:
      - ${DNS_SERVER}  # 내부 DNS (basphere.local 해석)
    ports:
      - "8428:8428"       # HTTP API + Prometheus remote_write
      - "8089:8089"       # InfluxDB line protocol (Telegraf push용)
      - "2003:2003"       # Graphite protocol
    volumes:
      - /data/victoriametrics:/storage
      - ./configs/victoriametrics/scrape.yml:/etc/victoriametrics/scrape.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=${VM_RETENTION_PERIOD:-180d}"
      - "--promscrape.config=/etc/victoriametrics/scrape.yml"
      - "--httpListenAddr=:8428"
      - "--influxListenAddr=:8089"
      - "--graphiteListenAddr=:2003"
      - "--promscrape.config.strictParse=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # vmalert - Alert 규칙 평가 엔진
  # VictoriaMetrics에 쿼리 → 규칙 평가 → Alertmanager로 전송
  # ---------------------------------------------------------------------------
  vmalert:
    image: victoriametrics/vmalert:v1.106.1
    container_name: vmalert
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    depends_on:
      victoriametrics:
        condition: service_healthy
    volumes:
      - ./configs/vmalert/alerts:/etc/vmalert/alerts:ro
    command:
      - "--datasource.url=http://victoriametrics:8428"
      - "--remoteRead.url=http://victoriametrics:8428"
      - "--remoteWrite.url=http://victoriametrics:8428"
      - "--notifier.url=http://alertmanager:9093"
      - "--rule=/etc/vmalert/alerts/*.yml"
      - "--evaluationInterval=30s"
      - "--httpListenAddr=:8880"
    ports:
      - "8880:8880"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Alertmanager - 알림 라우팅 및 Discord 전송
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    ports:
      - "9093:9093"
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://alertmanager:9093"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Grafana - 시각화 대시보드
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      victoriametrics:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?Set GF_ADMIN_PASSWORD in .env}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://localhost:3000}
      - GF_SERVER_DOMAIN=${GF_SERVER_DOMAIN:-localhost}
      # 보안 설정
      - GF_SECURITY_COOKIE_SECURE=false  # Nginx(HTTPS) 뒤에서 동작, 내부는 HTTP
      - GF_SECURITY_ALLOW_EMBEDDING=false
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # 익명 접근 차단
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # snmp_exporter - SNMP 기반 장비 메트릭 수집 (Phase 4)
  # TP-Link SG2218, Synology NAS, ipTime AP
  # ---------------------------------------------------------------------------
  snmp_exporter:
    image: prom/snmp-exporter:v0.26.0
    container_name: snmp_exporter
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    dns:
      - ${DNS_SERVER}
    ports:
      - "9116:9116"
    volumes:
      - ./configs/snmp_exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - "--config.file=/etc/snmp_exporter/snmp.yml"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # opnsense-exporter - OPNsense API 기반 메트릭 수집 (Phase 3)
  # OPNsense REST API를 통해 방화벽, 게이트웨이, DNS, VPN 등 수집
  # ---------------------------------------------------------------------------
  opnsense-exporter:
    image: ghcr.io/athennamind/opnsense-exporter:latest
    container_name: opnsense-exporter
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    dns:
      - ${DNS_SERVER}
    command:
      - --opnsense.protocol=https
      - --opnsense.address=cerberus.basphere.local
      - --exporter.instance-label=cerberus
      - --web.listen-address=:8080
      - --opnsense.insecure    # 내부 자체서명 인증서 허용
    environment:
      - OPNSENSE_EXPORTER_OPS_API_KEY=${OPNSENSE_API_KEY}
      - OPNSENSE_EXPORTER_OPS_API_SECRET=${OPNSENSE_API_SECRET}
      - OPNSENSE_EXPORTER_DISABLE_UNBOUND=true   # BIND DNS 사용, Unbound 미사용
      - OPNSENSE_EXPORTER_DISABLE_OPENVPN=true   # OpenVPN 미사용
    ports:
      - "8080:8080"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Loki - 로그 집계 시스템 (Phase 5)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.6.7
    container_name: loki
    restart: unless-stopped
    mem_limit: 1024m
    cpus: 1.0
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - /data/loki:/loki
      - ./configs/loki/rules:/loki/rules/fake:ro
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Promtail - Syslog 수신 → Loki 전송 (Phase 5)
  # OPNsense, ESXi, Synology NAS syslog 수신
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.6.7
    container_name: promtail
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      loki:
        condition: service_started
    ports:
      - "1514:1514/tcp"    # Syslog TCP (OPNsense 등 RFC 5424)
      - "9080:9080"        # Promtail HTTP (status/metrics)
    volumes:
      - ./configs/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /data/promtail:/data/promtail                    # positions 파일 영속화
      - /var/run/docker.sock:/var/run/docker.sock:ro     # Docker service discovery
      - /var/log:/var/log/host:ro                        # 호스트 OS 로그
    command:
      - "-config.file=/etc/promtail/config.yml"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # rsyslog - RFC 3164 → RFC 5424 변환 릴레이
  # ESXi syslog (BSD format)을 Promtail이 파싱 가능한 형식으로 변환
  # ---------------------------------------------------------------------------
  rsyslog:
    build: ./configs/rsyslog
    container_name: rsyslog
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.1
    depends_on:
      - promtail
    ports:
      - "1514:1514/udp"    # Syslog UDP (ESXi, vCenter)
      - "514:514/udp"      # Syslog UDP (TP-Link switch, 고정 포트)
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Blackbox Exporter - HTTP/HTTPS 엔드포인트 프로빙
  # ---------------------------------------------------------------------------
  blackbox_exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox_exporter
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    dns:
      - ${DNS_SERVER}
    ports:
      - "9115:9115"
    volumes:
      - ./configs/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # CAdvisor - 컨테이너 리소스 모니터링
  # Observer 서버 Docker 컨테이너 CPU/메모리/네트워크/I/O 메트릭 수집
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    privileged: true
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "8081:8080"  # 8080은 opnsense-exporter가 사용 중
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--disable_metrics=percpu,sched,tcp,udp,hugetlb,referenced_memory,resctrl,process"
      - "--housekeeping_interval=30s"
      - "--store_container_labels=true"
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Telegraf - vSphere 전체 메트릭 수집 (vmware_exporter 대체)
  # vCenter API를 통해 호스트/VM/데이터스토어 메트릭 수집
  # ---------------------------------------------------------------------------
  telegraf:
    build: ./configs/telegraf
    container_name: telegraf
    hostname: telegraf
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    dns:
      - ${DNS_SERVER}
    environment:
      - VCENTER_HOST=${VCENTER_HOST:-vcsa.basphere.local}
      - VCENTER_USER=${VCENTER_USER:?Set VCENTER_USER in .env}
      - VCENTER_PASSWORD=${VCENTER_PASSWORD:?Set VCENTER_PASSWORD in .env}
    volumes:
      - ./configs/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      victoriametrics:
        condition: service_healthy
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Discord Webhook Proxy
  # Alertmanager webhook → Discord webhook 형식 변환
  # ---------------------------------------------------------------------------
  discord-webhook-proxy:
    build: ./configs/discord-proxy
    container_name: discord-webhook-proxy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    environment:
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK_URL:-https://discord.com/api/webhooks/PLACEHOLDER}
      - DISCORD_USERNAME=Basphere Monitoring
      - LISTEN_PORT=9094
    ports:
      - "9094:9094"
    networks:
      - monitoring

# =============================================================================
# Volumes
# =============================================================================
volumes:
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  monitoring:
    driver: bridge
