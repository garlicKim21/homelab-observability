# =============================================================================
# Blackbox Exporter Configuration
# HTTP/HTTPS 엔드포인트 가용성 및 응답 시간 모니터링
# =============================================================================

modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      follow_redirects: true
      preferred_ip_protocol: "ip4"

  http_2xx_tls:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      fail_if_ssl: false
      tls_config:
        insecure_skip_verify: false
