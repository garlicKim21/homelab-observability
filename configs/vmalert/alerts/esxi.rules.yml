# =============================================================================
# ESXi / vCenter Alert Rules
# Telegraf vSphere 메트릭 기반 (vmware_exporter 대체)
# =============================================================================

groups:
  - name: esxi-host-alerts
    interval: 60s
    rules:
      # -----------------------------------------------------------------------
      # Critical: vCenter/Telegraf 연결 확인
      # -----------------------------------------------------------------------
      - alert: VCenterUnreachable
        expr: absent(vsphere_host_cpu_usage_average)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "vCenter 연결 불가"
          description: "Telegraf vSphere 플러그인이 5분 이상 호스트 메트릭을 수집하지 못하고 있습니다. vCenter 또는 Telegraf 상태를 확인하세요."

      # -----------------------------------------------------------------------
      # Critical: 호스트 가용성 (6대 기준)
      # -----------------------------------------------------------------------
      - alert: ESXiHostDown
        expr: count(vsphere_host_sys_uptime_latest > 0) < 6
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ESXi 호스트 다운 ({{ $value }}/6 온라인)"
          description: "ESXi 클러스터에서 {{ $value }}대만 온라인입니다. 호스트 상태를 확인하세요."

      # -----------------------------------------------------------------------
      # Critical: 스토리지
      # -----------------------------------------------------------------------
      - alert: DatastoreAlmostFull
        expr: >
          vsphere_datastore_disk_used_latest
          / vsphere_datastore_disk_capacity_latest > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Datastore 90% 초과: {{ $labels.dsname }}"
          description: >
            Datastore {{ $labels.dsname }}의 사용률이
            {{ $value | humanizePercentage }}입니다. 즉시 정리가 필요합니다.

      # -----------------------------------------------------------------------
      # Warning: 호스트 리소스
      # -----------------------------------------------------------------------
      - alert: ESXiHighCPU
        expr: vsphere_host_cpu_usage_average > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ESXi CPU 과부하: {{ $labels.esxhostname }}"
          description: >
            {{ $labels.esxhostname }}의 CPU 사용률이
            {{ $value | printf "%.1f" }}%로 10분 이상 85%를 초과합니다.

      - alert: ESXiHighMemory
        expr: vsphere_host_mem_usage_average > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ESXi 메모리 부족: {{ $labels.esxhostname }}"
          description: >
            {{ $labels.esxhostname }}의 메모리 사용률이
            {{ $value | printf "%.1f" }}%로 10분 이상 90%를 초과합니다.

      - alert: DatastoreHighUsage
        expr: >
          vsphere_datastore_disk_used_latest
          / vsphere_datastore_disk_capacity_latest > 0.75
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Datastore 75% 초과: {{ $labels.dsname }}"
          description: >
            Datastore {{ $labels.dsname }}의 사용률이
            {{ $value | humanizePercentage }}입니다.

      - alert: ESXiHighNetworkUsage
        expr: vsphere_host_net_usage_average / 1024 > 800
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ESXi 네트워크 과부하: {{ $labels.esxhostname }}"
          description: >
            {{ $labels.esxhostname }}의 네트워크 사용량이
            {{ $value | printf "%.0f" }}MB/s로 높습니다.

  - name: esxi-vm-alerts
    interval: 60s
    rules:
      # -----------------------------------------------------------------------
      # Warning: VM 리소스
      # -----------------------------------------------------------------------
      - alert: VMHighCPU
        expr: vsphere_vm_cpu_usage_average > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "VM CPU 과부하: {{ $labels.vmname }}"
          description: >
            VM {{ $labels.vmname }}(호스트: {{ $labels.esxhostname }})의
            CPU 사용률이 15분 이상 90%를 초과합니다.

      - alert: VMHighMemory
        expr: vsphere_vm_mem_usage_average > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "VM 메모리 부족: {{ $labels.vmname }}"
          description: >
            VM {{ $labels.vmname }}(호스트: {{ $labels.esxhostname }})의
            메모리 사용률이 15분 이상 90%를 초과합니다.
