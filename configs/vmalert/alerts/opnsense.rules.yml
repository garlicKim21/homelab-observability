# =============================================================================
# OPNsense Alert Rules (Phase 3)
# 시스템 메트릭: node_exporter (os-node_exporter 플러그인)
# 방화벽/게이트웨이/VPN: opnsense-exporter (OPNsense API)
# =============================================================================

groups:
  - name: opnsense-system
    interval: 30s
    rules:
      # -----------------------------------------------------------------------
      # Critical: OPNsense 가용성
      # -----------------------------------------------------------------------
      - alert: OPNsenseDown
        expr: up{job="opnsense_node"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "OPNsense(cerberus) node_exporter 응답 없음"
          description: "OPNsense에서 3분 이상 메트릭이 수신되지 않습니다. 장비 또는 node_exporter 확인 필요."

      # -----------------------------------------------------------------------
      # Warning: 시스템 리소스 (node_exporter 메트릭)
      # -----------------------------------------------------------------------
      - alert: OPNsenseHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{job="opnsense_node", mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "OPNsense CPU 과부하"
          description: "OPNsense CPU 사용률 {{ $value | printf \"%.1f\" }}%가 10분 이상 80%를 초과합니다."

      - alert: OPNsenseHighMemory
        expr: (1 - (node_memory_free_bytes{job="opnsense_node"} + node_memory_inactive_bytes{job="opnsense_node"} + node_memory_cache_bytes{job="opnsense_node"} + node_memory_buffer_bytes{job="opnsense_node"}) / node_memory_size_bytes{job="opnsense_node"}) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "OPNsense 메모리 부족"
          description: "OPNsense 메모리 사용률 {{ $value | printf \"%.1f\" }}%가 10분 이상 85%를 초과합니다."

      - alert: OPNsenseDiskFull
        expr: (1 - node_filesystem_avail_bytes{job="opnsense_node", mountpoint="/"} / node_filesystem_size_bytes{job="opnsense_node", mountpoint="/"}) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "OPNsense 디스크 부족"
          description: "OPNsense 루트 파티션 사용률 {{ $value | printf \"%.1f\" }}%"

  - name: opnsense-firewall
    interval: 30s
    rules:
      # -----------------------------------------------------------------------
      # Warning: 방화벽 통계 (opnsense-exporter 메트릭)
      # -----------------------------------------------------------------------
      - alert: OPNsenseExporterDown
        expr: up{job="opnsense"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "opnsense-exporter 응답 없음"
          description: "opnsense-exporter가 3분 이상 메트릭을 제공하지 않습니다. API 키 또는 네트워크 확인 필요."

      - alert: OPNsenseServiceDown
        expr: opnsense_services_status == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OPNsense 서비스 중지: {{ $labels.name }}"
          description: "OPNsense 서비스 {{ $labels.name }}({{ $labels.description }})이 5분 이상 중지 상태입니다."

  - name: opnsense-gateway
    interval: 30s
    rules:
      # -----------------------------------------------------------------------
      # Critical: 게이트웨이 다운
      # -----------------------------------------------------------------------
      - alert: GatewayDown
        expr: opnsense_gateways_status == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "게이트웨이 다운: {{ $labels.name }}"
          description: "OPNsense 게이트웨이 {{ $labels.name }}({{ $labels.address }})이 2분 이상 다운 상태입니다."

      # -----------------------------------------------------------------------
      # Warning: 게이트웨이 품질
      # -----------------------------------------------------------------------
      - alert: GatewayHighLatency
        expr: opnsense_gateways_rtt_milliseconds > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "게이트웨이 지연 높음: {{ $labels.name }}"
          description: "게이트웨이 {{ $labels.name }} RTT {{ $value | printf \"%.1f\" }}ms (5분 이상 100ms 초과)"

      - alert: GatewayPacketLoss
        expr: opnsense_gateways_loss_percentage > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "게이트웨이 패킷 로스: {{ $labels.name }}"
          description: "게이트웨이 {{ $labels.name }} 패킷 로스 {{ $value | printf \"%.1f\" }}% (5분 이상 5% 초과)"

  - name: opnsense-network
    interval: 30s
    rules:
      # -----------------------------------------------------------------------
      # Warning: 인터페이스 트래픽 (node_exporter 메트릭)
      # -----------------------------------------------------------------------
      - alert: WANHighUtilization
        expr: (rate(node_network_receive_bytes_total{job="opnsense_node", device="igc5"}[5m]) + rate(node_network_transmit_bytes_total{job="opnsense_node", device="igc5"}[5m])) > 100000000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "WAN 대역폭 사용량 높음"
          description: "WAN(igc5) 트래픽이 10분 이상 800Mbps를 초과합니다."

      - alert: InterfaceErrors
        expr: rate(node_network_receive_errs_total{job="opnsense_node"}[5m]) + rate(node_network_transmit_errs_total{job="opnsense_node"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "네트워크 인터페이스 에러: {{ $labels.device }}"
          description: "OPNsense 인터페이스 {{ $labels.device }}에서 패킷 에러가 발생하고 있습니다."

  - name: opnsense-vpn
    interval: 60s
    rules:
      # -----------------------------------------------------------------------
      # Info: WireGuard 상태 (opnsense-exporter 메트릭)
      # -----------------------------------------------------------------------
      - alert: WireGuardInterfaceDown
        expr: opnsense_wireguard_interfaces_status == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WireGuard 인터페이스 다운"
          description: "WireGuard 인터페이스가 5분 이상 다운 상태입니다."

      - alert: WireGuardPeerDisconnected
        expr: opnsense_wireguard_peer_status == 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "WireGuard 피어 연결 끊김"
          description: "WireGuard 피어가 10분 이상 연결되지 않았습니다."
