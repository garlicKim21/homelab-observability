# =============================================================================
# Observer Server Alert Rules
# 모니터링 서버 자체에 대한 알림 규칙
# =============================================================================

groups:
  - name: observer-server
    interval: 30s
    rules:
      # -----------------------------------------------------------------------
      # Critical: 디스크 용량
      # -----------------------------------------------------------------------
      - alert: ObserverDiskAlmostFull
        expr: (1 - node_filesystem_avail_bytes{job="observer_node", mountpoint="/"} / node_filesystem_size_bytes{job="observer_node", mountpoint="/"}) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Observer OS 디스크(/) 용량 부족"
          description: "Observer 서버 루트 파티션 사용률 {{ $value | printf \"%.1f\" }}%가 90%를 초과합니다."

      - alert: ObserverDataDiskFull
        expr: (1 - node_filesystem_avail_bytes{job="observer_node", mountpoint="/data"} / node_filesystem_size_bytes{job="observer_node", mountpoint="/data"}) * 100 > 85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Observer 데이터 디스크(/data) 용량 부족"
          description: "Observer 서버 데이터 파티션(/data) 사용률 {{ $value | printf \"%.1f\" }}%가 85%를 초과합니다. VM/Loki 데이터 정리 필요."

      # -----------------------------------------------------------------------
      # Warning: 시스템 리소스
      # -----------------------------------------------------------------------
      - alert: ObserverHighMemory
        expr: (1 - node_memory_MemAvailable_bytes{job="observer_node"} / node_memory_MemTotal_bytes{job="observer_node"}) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Observer 서버 메모리 부족"
          description: "Observer 서버 메모리 사용률 {{ $value | printf \"%.1f\" }}%가 10분 이상 85%를 초과합니다."

      - alert: ObserverHighCPU
        expr: 100 - (avg(rate(node_cpu_seconds_total{job="observer_node", mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Observer 서버 CPU 과부하"
          description: "Observer 서버 CPU 사용률 {{ $value | printf \"%.1f\" }}%가 10분 이상 80%를 초과합니다."

      # -----------------------------------------------------------------------
      # Warning: 디스크 I/O
      # -----------------------------------------------------------------------
      - alert: ObserverHighDiskIOUtilization
        expr: rate(node_disk_io_time_seconds_total{job="observer_node", device!~"loop.*|dm-.*"}[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Observer 디스크 I/O 사용률 과다"
          description: "Observer 서버 디스크 {{ $labels.device }} I/O 사용률 {{ $value | printf \"%.1f\" }}%가 10분 이상 80%를 초과합니다."

      - alert: ObserverHighDiskLatency
        expr: rate(node_disk_write_time_seconds_total{job="observer_node", device!~"loop.*|dm-.*"}[5m]) / rate(node_disk_writes_completed_total{job="observer_node", device!~"loop.*|dm-.*"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Observer 디스크 쓰기 지연시간 과다"
          description: "Observer 서버 디스크 {{ $labels.device }} 쓰기 지연시간 {{ $value | printf \"%.3f\" }}초가 5분 이상 50ms를 초과합니다."

      # -----------------------------------------------------------------------
      # Info/Warning: 컨테이너 모니터링
      # -----------------------------------------------------------------------
      - alert: ObserverCAdvisorDown
        expr: up{job="observer_cadvisor"} == 0
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Observer CAdvisor 다운"
          description: "Observer 서버 CAdvisor가 5분 이상 응답하지 않습니다. 컨테이너 메트릭 수집 불가."

      - alert: ObserverContainerDown
        expr: count(container_last_seen{job="observer_cadvisor", container_label_com_docker_compose_service=~".+"}) < 13
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Observer 컨테이너 수 감소"
          description: "Observer 서버 실행 중 컨테이너 수가 {{ $value }}개로, 예상(13개)보다 적습니다."

      - alert: ObserverContainerHighMemory
        expr: container_memory_usage_bytes{job="observer_cadvisor", container_label_com_docker_compose_service=~".+"} > 2147483648
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Observer 컨테이너 메모리 과다 사용"
          description: "Observer 서버 컨테이너 {{ $labels.name }} 메모리 사용량이 10분 이상 2GB를 초과합니다."
