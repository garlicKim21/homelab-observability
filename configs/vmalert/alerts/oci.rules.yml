# =============================================================================
# OCI Cloud Instance Alert Rules (ratatosk.io)
# ARM 4C/24G, Singapore Region, Ubuntu 24.04
# =============================================================================

groups:
  - name: oci_critical
    interval: 30s
    rules:
      - alert: OCIInstanceDown
        expr: up{job="oci_node"} == 0
        for: 2m
        labels:
          severity: critical
          device_type: cloud
        annotations:
          summary: "OCI 인스턴스 다운 (ratatosk.io)"
          description: "OCI 인스턴스가 2분 이상 응답하지 않습니다. VPN 연결 또는 인스턴스 상태를 확인하세요."

      - alert: OCIDiskAlmostFull
        expr: (1 - node_filesystem_avail_bytes{job="oci_node", mountpoint="/"} / node_filesystem_size_bytes{job="oci_node", mountpoint="/"}) * 100 > 95
        for: 5m
        labels:
          severity: critical
          device_type: cloud
        annotations:
          summary: "OCI 루트 디스크 사용률 95% 초과"
          description: "루트 파티션(/) 사용률: {{ $value | printf \"%.1f\" }}%. 시스템 로그/패키지 정리가 필요할 수 있습니다."

      - alert: OCIDataDiskAlmostFull
        expr: (1 - node_filesystem_avail_bytes{job="oci_node", mountpoint="/data"} / node_filesystem_size_bytes{job="oci_node", mountpoint="/data"}) * 100 > 90
        for: 5m
        labels:
          severity: critical
          device_type: cloud
        annotations:
          summary: "OCI 데이터 디스크 사용률 90% 초과"
          description: "데이터 파티션(/data) 사용률: {{ $value | printf \"%.1f\" }}%. Docker 이미지/볼륨 정리가 필요할 수 있습니다."

  - name: oci_warning
    interval: 60s
    rules:
      - alert: OCIHighCPU
        expr: 100 - (avg(rate(node_cpu_seconds_total{job="oci_node", mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "OCI CPU 사용률 80% 초과"
          description: "CPU 사용률이 10분 이상 {{ $value | printf \"%.1f\" }}%입니다."

      - alert: OCIHighMemory
        expr: (1 - node_memory_MemAvailable_bytes{job="oci_node"} / node_memory_MemTotal_bytes{job="oci_node"}) * 100 > 85
        for: 10m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "OCI 메모리 사용률 85% 초과"
          description: "메모리 사용률: {{ $value | printf \"%.1f\" }}%. 컨테이너 리소스 제한을 확인하세요."

      - alert: OCIDiskWarning
        expr: (1 - node_filesystem_avail_bytes{job="oci_node", mountpoint="/"} / node_filesystem_size_bytes{job="oci_node", mountpoint="/"}) * 100 > 90
        for: 5m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "OCI 루트 디스크 사용률 90% 초과"
          description: "루트 파티션(/) 사용률: {{ $value | printf \"%.1f\" }}%."

      - alert: OCIDataDiskWarning
        expr: (1 - node_filesystem_avail_bytes{job="oci_node", mountpoint="/data"} / node_filesystem_size_bytes{job="oci_node", mountpoint="/data"}) * 100 > 75
        for: 5m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "OCI 데이터 디스크 사용률 75% 초과"
          description: "데이터 파티션(/data) 사용률: {{ $value | printf \"%.1f\" }}%."

      - alert: OCIContainerDown
        expr: absent(container_last_seen{job="oci_cadvisor", name="ratatosk-app"}) or absent(container_last_seen{job="oci_cadvisor", name="ratatosk-caddy"}) or absent(container_last_seen{job="oci_cadvisor", name="ratatosk-db"})
        for: 2m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "OCI 핵심 컨테이너 중단"
          description: "ratatosk-app, ratatosk-caddy, ratatosk-db 중 하나 이상이 실행되지 않고 있습니다."

      - alert: OCIHighContainerMemory
        expr: container_memory_usage_bytes{job="oci_cadvisor", name=~"ratatosk-.+"} / container_spec_memory_limit_bytes{job="oci_cadvisor", name=~"ratatosk-.+"} * 100 > 85
        for: 5m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "컨테이너 메모리 제한 85% 도달 ({{ $labels.name }})"
          description: "{{ $labels.name }} 컨테이너가 메모리 제한의 {{ $value | printf \"%.1f\" }}%를 사용 중입니다."

  - name: oci_services
    interval: 60s
    rules:
      - alert: RatatoskEndpointDown
        expr: probe_success{job="blackbox_http", instance="https://ratatosk.io"} == 0
        for: 3m
        labels:
          severity: critical
          device_type: cloud
        annotations:
          summary: "ratatosk.io 접속 불가"
          description: "https://ratatosk.io이 3분 이상 응답하지 않습니다. Caddy/App 상태를 확인하세요."

      - alert: UmamiEndpointDown
        expr: probe_success{job="blackbox_internal", instance=~".*:3001"} == 0
        for: 3m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "Umami 접속 불가"
          description: "Umami가 3분 이상 응답하지 않습니다."

      - alert: SSLCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry{job="blackbox_http"} - time()) / 86400 < 14
        for: 1h
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "SSL 인증서 만료 임박 ({{ $value | printf \"%.0f\" }}일)"
          description: "ratatosk.io SSL 인증서가 {{ $value | printf \"%.0f\" }}일 후 만료됩니다."

      - alert: OCIPostgresDown
        expr: up{job="oci_postgres"} == 0
        for: 3m
        labels:
          severity: critical
          device_type: cloud
        annotations:
          summary: "PostgreSQL Exporter 응답 없음"
          description: "ratatosk PostgreSQL exporter가 3분 이상 메트릭을 제공하지 않습니다."

      - alert: OCIPostgresHighConnections
        expr: pg_stat_activity_count{job="oci_postgres", state="active"} > 50
        for: 5m
        labels:
          severity: warning
          device_type: cloud
        annotations:
          summary: "PostgreSQL 활성 커넥션 과다"
          description: "활성 커넥션 수: {{ $value }}. 커넥션 풀 또는 쿼리 최적화 확인 필요."

  - name: oci_info
    interval: 60s
    rules:
      - alert: OCICAdvisorDown
        expr: up{job="oci_cadvisor"} == 0
        for: 5m
        labels:
          severity: info
          device_type: cloud
        annotations:
          summary: "OCI cAdvisor 미응답"
          description: "컨테이너 메트릭 수집기(cAdvisor)가 응답하지 않습니다. 컨테이너 상태를 확인하세요."
