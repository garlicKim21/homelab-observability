# =============================================================================
# Telegraf - vSphere Datastore Performance Metrics
# vmware_exporter가 수집하지 않는 데이터스토어 지연 시간 보완
# =============================================================================

[global_tags]

[agent]
  interval = "60s"
  round_interval = true
  flush_interval = "60s"
  flush_jitter = "5s"

# =============================================================================
# Output: VictoriaMetrics (InfluxDB HTTP API)
# =============================================================================
[[outputs.influxdb]]
  urls = ["http://victoriametrics:8428"]
  database = ""
  skip_database_creation = true

# =============================================================================
# Input: vSphere - 호스트별 데이터스토어 성능 카운터만 수집
# =============================================================================
[[inputs.vsphere]]
  vcenters = ["https://${VCENTER_HOST}"]
  username = "${VCENTER_USER}"
  password = "${VCENTER_PASSWORD}"
  insecure_skip_verify = true

  # VM 수집 완전 비활성화 (vmware_exporter가 담당)
  vm_include = []

  # 호스트: 데이터스토어 지연 시간만 수집
  host_include = ["/**"]
  host_metric_include = [
    "datastore.totalReadLatency.average",
    "datastore.totalWriteLatency.average",
    "datastore.read.average",
    "datastore.write.average",
  ]
  host_metric_exclude = []
  host_instances = true

  # 클러스터 수집 완전 비활성화
  cluster_include = []

  # 데이터센터 수집 완전 비활성화
  datacenter_include = []

  # 데이터스토어 객체 수집 완전 비활성화 (vmware_exporter가 담당)
  datastore_include = []

  # 리소스풀 비활성화
  resource_pool_include = []

  # 수집 간격
  collect_concurrency = 2
  discover_concurrency = 2
  max_query_metrics = 256
  historical_interval = "300s"
