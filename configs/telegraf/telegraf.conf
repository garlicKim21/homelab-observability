# =============================================================================
# Telegraf - vSphere Datastore Performance Metrics
# vmware_exporter가 수집하지 않는 데이터스토어 지연 시간 보완
# =============================================================================

[global_tags]

[agent]
  interval = "60s"
  round_interval = true
  flush_interval = "60s"
  flush_jitter = "5s"

# =============================================================================
# Output: VictoriaMetrics (InfluxDB line protocol)
# =============================================================================
[[outputs.influxdb]]
  urls = ["http://victoriametrics:8089"]
  skip_database_creation = true

# =============================================================================
# Input: vSphere - 호스트별 데이터스토어 성능 카운터
# =============================================================================
[[inputs.vsphere]]
  vcenters = ["https://${VCENTER_HOST}"]
  username = "${VCENTER_USER}"
  password = "${VCENTER_PASSWORD}"
  insecure_skip_verify = true

  # VM 메트릭 수집 안함 (vmware_exporter가 담당)
  vm_metric_include = []
  vm_instances = false

  # 호스트 메트릭: 데이터스토어 지연 시간만 수집
  host_metric_include = [
    "datastore.totalReadLatency.average",
    "datastore.totalWriteLatency.average",
    "datastore.read.average",
    "datastore.write.average",
  ]
  host_instances = true

  # 클러스터/데이터센터 레벨 수집 안함
  cluster_metric_include = []
  cluster_instances = false
  datacenter_metric_include = []
  datacenter_instances = false

  # 데이터스토어 객체 메트릭 수집 안함 (vmware_exporter가 담당)
  datastore_metric_include = []
  datastore_instances = false

  # 수집 간격
  collect_concurrency = 2
  discover_concurrency = 2
  max_query_metrics = 256

  # 히스토리컬 간격 (realtime = 20s)
  historical_interval = "300s"
