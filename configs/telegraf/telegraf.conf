# =============================================================================
# Telegraf - vSphere Full Metrics (vmware_exporter replacement)
# vCenter API를 통해 호스트, VM, 데이터스토어 전체 메트릭 수집
# =============================================================================

[global_tags]

[agent]
  interval = "60s"
  round_interval = true
  flush_interval = "60s"
  flush_jitter = "5s"

# =============================================================================
# Output: VictoriaMetrics (InfluxDB HTTP API)
# =============================================================================
[[outputs.influxdb]]
  urls = ["http://victoriametrics:8428"]
  database = ""
  skip_database_creation = true

# =============================================================================
# Input: vSphere - 호스트/VM/데이터스토어 전체 메트릭 수집
# =============================================================================
[[inputs.vsphere]]
  vcenters = ["https://${VCENTER_HOST}"]
  username = "${VCENTER_USER}"
  password = "${VCENTER_PASSWORD}"
  insecure_skip_verify = true

  # --- 호스트 메트릭 ---
  host_include = ["/**"]
  host_metric_include = [
    "cpu.usage.average",
    "cpu.usagemhz.average",
    "mem.usage.average",
    "mem.active.average",
    "mem.swapinRate.average",
    "mem.swapoutRate.average",
    "net.bytesRx.average",
    "net.bytesTx.average",
    "net.usage.average",
    "disk.read.average",
    "disk.write.average",
    "datastore.totalReadLatency.average",
    "datastore.totalWriteLatency.average",
    "datastore.read.average",
    "datastore.write.average",
    "sys.uptime.latest",
    "power.power.average",
  ]
  host_metric_exclude = []
  host_instances = true

  # --- VM 메트릭 ---
  vm_include = ["/**"]
  vm_metric_include = [
    "cpu.usage.average",
    "cpu.usagemhz.average",
    "mem.usage.average",
    "mem.active.average",
    "mem.consumed.average",
    "mem.swapped.average",
    "net.received.average",
    "net.transmitted.average",
    "disk.read.average",
    "disk.write.average",
    "disk.maxTotalLatency.latest",
    "virtualDisk.read.average",
    "virtualDisk.write.average",
    "sys.uptime.latest",
  ]
  vm_metric_exclude = []
  vm_instances = true

  # --- 데이터스토어 메트릭 (용량 정보) ---
  datastore_include = ["/**"]
  datastore_metric_include = [
    "disk.capacity.latest",
    "disk.provisioned.latest",
    "disk.used.latest",
  ]

  # --- 클러스터: 객체 발견만 (이름 해석용) ---
  cluster_include = ["/**"]
  cluster_metric_include = []

  # --- 데이터센터: 객체 발견만 ---
  datacenter_include = ["/**"]
  datacenter_metric_include = []

  # --- 리소스풀 비활성화 ---
  resource_pool_include = []

  # --- 수집 설정 ---
  collect_concurrency = 3
  discover_concurrency = 3
  max_query_metrics = 256
  historical_interval = "300s"

# =============================================================================
# Input: exec - vCenter Inventory (VM 수, 스냅샷, 클러스터 vMotion)
# govc로 vCenter API 직접 호출 → Telegraf vSphere가 못 수집하는 항목 보완
# =============================================================================
[[inputs.exec]]
  commands = ["/etc/telegraf/vsphere-inventory.sh"]
  timeout = "30s"
  interval = "300s"
  data_format = "influx"

# =============================================================================
# Input: exec - OCI Cloud Metrics (DRG + VPN)
# OCI Monitoring API → Python SDK → Influx line protocol
# Profiles: SINGAPORE (default), CHUNCHEON, OSAKA (추후 추가)
# =============================================================================
[[inputs.exec]]
  commands = ["python3 /etc/telegraf/oci-metrics.py"]
  timeout = "30s"
  interval = "60s"
  data_format = "influx"
