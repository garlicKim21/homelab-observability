# =============================================================================
# Alertmanager Configuration
# Discord Webhookмқ„ нҶөн•ң м•ҢлҰј м „мҶЎ
# =============================================================================

global:
  resolve_timeout: 5m

route:
  receiver: "discord"
  group_by: ["alertname", "severity", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical м•ҢлҰј: мҰүмӢң м „мҶЎ, л°ҳліө к°„кІ© м§§кІҢ
    - match:
        severity: critical
      receiver: "discord"
      group_wait: 10s
      repeat_interval: 1h

    # Warning м•ҢлҰј: кё°ліё м„Өм •
    - match:
        severity: warning
      receiver: "discord"
      repeat_interval: 4h

    # Info м•ҢлҰј: л°ҳліө к°„кІ© кёёкІҢ
    - match:
        severity: info
      receiver: "discord"
      repeat_interval: 12h

receivers:
  - name: "discord"
    webhook_configs:
      - url: "http://discord-webhook-proxy:9094"
        send_resolved: true
        max_alerts: 5

# =============================================================================
# м°ёкі : DiscordлҠ” Alertmanager webhook нҳ•мӢқмқ„ м§Ғм ‘ м§Җмӣҗн•ҳм§Җ м•ҠмңјлҜҖлЎң
# alertmanager-discord н”„лЎқмӢңлҘј мӮ¬мҡ©н•ҳкұ°лӮҳ,
# .envмқҳ DISCORD_WEBHOOK_URLмқ„ м§Ғм ‘ мӮ¬мҡ©н•ҳлҠ” н”„лЎқмӢң м»Ён…Ңмқҙл„Ҳк°Җ н•„мҡ”н•©лӢҲлӢӨ.
# docker-compose.ymlм—җ Phase 1 мҷ„лЈҢ нӣ„ discord-webhook-proxy м¶”к°Җ мҳҲм •.
#
# лҢҖм•Ҳ: Grafanaмқҳ Contact Pointsм—җм„ң м§Ғм ‘ Discord webhook м„Өм • к°ҖлҠҘ
# (Grafana Alerting мӮ¬мҡ© мӢң Alertmanager м—ҶмқҙлҸ„ к°ҖлҠҘ)
# =============================================================================

inhibit_rules:
  # к°ҷмқҖ лҢҖмғҒм—җм„ң criticalмқҙ firingмқҙл©ҙ warning м–өм ң
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
