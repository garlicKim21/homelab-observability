# =============================================================================
# rsyslog - RFC 3164 → RFC 5424 변환 릴레이
# ESXi, vCenter syslog (BSD format)을 Promtail이 파싱 가능한 형식으로 변환
# warning 이상만 전달 (info, notice, debug는 drop)
# =============================================================================

module(load="imudp")
input(type="imudp" port="1514")

# warning(4) 이상만 전달, notice(5)/info(6)/debug(7)는 drop
if $syslogseverity > 4 then stop

*.* action(type="omfwd"
    target="promtail"
    port="1515"
    protocol="tcp"
    template="RSYSLOG_SyslogProtocol23Format")
