# =============================================================================
# rsyslog - RFC 3164 → RFC 5424 변환 릴레이
# ESXi, vCenter syslog (BSD format)을 Promtail이 파싱 가능한 형식으로 변환
# vCenter(vcsa)는 warning 이상만 전달 (전체 로그는 NAS에 아카이브)
# =============================================================================

module(load="imudp")
input(type="imudp" port="1514")

# vCenter(vcsa): warning 이상만 전달
if $hostname == "vcsa" and $syslogseverity > 4 then stop

# 나머지(ESXi 등): 전부 전달
*.* action(type="omfwd"
    target="promtail"
    port="1515"
    protocol="tcp"
    template="RSYSLOG_SyslogProtocol23Format")
