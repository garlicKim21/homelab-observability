# =============================================================================
# rsyslog - RFC 3164 вҶ’ RFC 5424 ліҖнҷҳ лҰҙл Ҳмқҙ
# ESXi, vCenter, TP-Link switch syslogмқ„ Promtailмқҙ нҢҢмӢұ к°ҖлҠҘн•ң нҳ•мӢқмңјлЎң ліҖнҷҳ
# ESXi/vCenter(port 1514): warning мқҙмғҒл§Ң м „лӢ¬
# TP-Link switch(port 514): м „л¶Җ м „лӢ¬ (мҠӨмң„м№ҳ мһҗмІҙ severity н•„н„°л§Ғ)
# =============================================================================

module(load="imudp")
input(type="imudp" port="1514" ruleset="esxi_vcenter")
input(type="imudp" port="514" ruleset="switch")

# ESXi/vCenter: warning(4) мқҙмғҒл§Ң м „лӢ¬
ruleset(name="esxi_vcenter") {
    if $syslogseverity > 4 then stop
    *.* action(type="omfwd"
        target="promtail"
        port="1515"
        protocol="tcp"
        template="RSYSLOG_SyslogProtocol23Format")
}

# TP-Link switch: м „л¶Җ м „лӢ¬
ruleset(name="switch") {
    *.* action(type="omfwd"
        target="promtail"
        port="1515"
        protocol="tcp"
        template="RSYSLOG_SyslogProtocol23Format")
}
