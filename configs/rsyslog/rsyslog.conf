# =============================================================================
# rsyslog - RFC 3164 → RFC 5424 변환 릴레이
# ESXi, vCenter, TP-Link switch syslog을 Promtail이 파싱 가능한 형식으로 변환
# ESXi/vCenter: warning 이상만 전달 (스위치는 자체 severity 필터링)
# =============================================================================

module(load="imudp")
input(type="imudp" port="1514")
input(type="imudp" port="514")   # TP-Link switch (고정 포트)

# ESXi/vCenter: warning(4) 이상만 전달, notice(5)/info(6)/debug(7)는 drop
# 스위치(SG2218)는 자체 severity 필터링이 있으므로 제외
if $hostname != "SG2218" and $syslogseverity > 4 then stop

*.* action(type="omfwd"
    target="promtail"
    port="1515"
    protocol="tcp"
    template="RSYSLOG_SyslogProtocol23Format")
