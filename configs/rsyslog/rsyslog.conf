# =============================================================================
# rsyslog - RFC 3164 → RFC 5424 변환 릴레이
# ESXi, vCenter, TP-Link switch syslog을 Promtail이 파싱 가능한 형식으로 변환
# ESXi/vCenter(port 1514): warning 이상만 전달
# TP-Link switch(port 514): 비표준 형식 → hostname 고정 후 전달
# =============================================================================

module(load="imudp")
input(type="imudp" port="1514" ruleset="esxi_vcenter")
input(type="imudp" port="514" ruleset="switch")

# TP-Link switch용 RFC 5424 템플릿 (hostname을 SG2218로 고정)
template(name="SwitchForward" type="string"
    string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% SG2218 switch - - - %msg%\n")

# ESXi/vCenter: warning(4) 이상만 전달
ruleset(name="esxi_vcenter") {
    if $syslogseverity > 4 then stop
    *.* action(type="omfwd"
        target="promtail"
        port="1515"
        protocol="tcp"
        template="RSYSLOG_SyslogProtocol23Format")
}

# TP-Link switch: hostname 고정 템플릿으로 전달
ruleset(name="switch") {
    *.* action(type="omfwd"
        target="promtail"
        port="1515"
        protocol="tcp"
        template="SwitchForward")
}
