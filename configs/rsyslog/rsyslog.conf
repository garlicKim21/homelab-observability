# =============================================================================
# rsyslog - RFC 3164 → RFC 5424 변환 릴레이
# ESXi syslog (BSD format)을 Promtail이 파싱 가능한 형식으로 변환
# =============================================================================

module(load="imudp")
input(type="imudp" port="1514")

module(load="omfwd")

*.* action(type="omfwd"
    target="promtail"
    port="1515"
    protocol="tcp"
    template="RSYSLOG_SyslogProtocol23Format")
