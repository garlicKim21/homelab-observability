# =============================================================================
# SNMP Exporter Configuration
# 대상: TP-Link SG2218, Synology NAS DS1515+, ipTime AX300BCM
#
# 참고: 이 파일은 기본 MIB 기반 수동 설정입니다.
# 더 정밀한 설정이 필요하면 snmp_exporter generator로 MIB에서 자동 생성하세요.
# https://github.com/prometheus/snmp_exporter/tree/main/generator
#
# 민감 정보(비밀번호)는 플레이스홀더로 관리됩니다.
# deploy.sh가 .env 값으로 자동 치환합니다.
# =============================================================================

auths:
  # SNMP v3 인증 프로필 - TP-Link SG2218 (SHA + DES)
  basphere_v3_des:
    version: 3
    security_level: authPriv
    username: "<SNMP_USERNAME>"
    password: "<SNMP_AUTH_PASS>"
    auth_protocol: SHA
    priv_protocol: DES
    priv_password: "<SNMP_PRIV_PASS>"

  # SNMP v3 인증 프로필 - Synology NAS (SHA + AES)
  basphere_v3_nas:
    version: 3
    security_level: authPriv
    username: "<SNMP_USERNAME>"
    password: "<SNMP_AUTH_PASS>"
    auth_protocol: SHA
    priv_protocol: AES
    priv_password: "<SNMP_PRIV_PASS>"

  # SNMP v3 인증 프로필 - ipTime AP (SHA + AES, 사용자명 하이픈 불가)
  basphere_v3_ap:
    version: 3
    security_level: authPriv
    username: "<SNMP_AP_USERNAME>"
    password: "<SNMP_AP_AUTH_PASS>"
    auth_protocol: SHA
    priv_protocol: AES
    priv_password: "<SNMP_AP_PRIV_PASS>"

modules:
  # =========================================================================
  # IF-MIB: 표준 네트워크 인터페이스 메트릭
  # 대상: TP-Link SG2218, ipTime AX300BCM
  # =========================================================================
  if_mib:
    walk:
      - 1.3.6.1.2.1.1.3   # sysUpTime
      - 1.3.6.1.2.1.1.5   # sysName
      - 1.3.6.1.2.1.1.1   # sysDescr
      - 1.3.6.1.2.1.2.2   # ifTable
      - 1.3.6.1.2.1.31.1.1  # ifXTable
    get:
      - 1.3.6.1.2.1.1.3.0   # sysUpTime.0
      - 1.3.6.1.2.1.1.5.0   # sysName.0
      - 1.3.6.1.2.1.1.1.0   # sysDescr.0
    metrics:
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3.0
        type: gauge
        help: System uptime in hundredths of a second

      # --- Interface metrics ---
      - name: ifNumber
        oid: 1.3.6.1.2.1.2.1.0
        type: gauge
        help: Number of network interfaces

      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: Interface operational status (1=up, 2=down, 3=testing)
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
          - labels: [ifIndex]
            labelname: ifAlias
            oid: 1.3.6.1.2.1.31.1.1.1.18
            type: DisplayString

      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Total bytes received (64-bit counter)
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Total bytes sent (64-bit counter)
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        help: Inbound packets with errors
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        help: Outbound packets with errors
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifInDiscards
        oid: 1.3.6.1.2.1.2.2.1.13
        type: counter
        help: Inbound packets discarded
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifOutDiscards
        oid: 1.3.6.1.2.1.2.2.1.19
        type: counter
        help: Outbound packets discarded
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifSpeed
        oid: 1.3.6.1.2.1.2.2.1.5
        type: gauge
        help: Interface speed in bits per second
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

  # =========================================================================
  # Synology: Synology NAS 전용 MIB
  # 대상: DS1515+
  # MIBs: SYNOLOGY-SYSTEM-MIB, SYNOLOGY-DISK-MIB, SYNOLOGY-RAID-MIB,
  #        SYNOLOGY-STORAGEIO-MIB + 기본 IF-MIB
  # =========================================================================
  synology:
    walk:
      - 1.3.6.1.2.1.1.3     # sysUpTime
      - 1.3.6.1.2.1.1.5     # sysName
      - 1.3.6.1.2.1.2.2     # ifTable
      - 1.3.6.1.2.1.31.1.1  # ifXTable
      # SYNOLOGY-SYSTEM-MIB
      - 1.3.6.1.4.1.6574.1
      # SYNOLOGY-DISK-MIB
      - 1.3.6.1.4.1.6574.2
      # SYNOLOGY-RAID-MIB
      - 1.3.6.1.4.1.6574.3
      # SYNOLOGY-STORAGEIO-MIB
      - 1.3.6.1.4.1.6574.101
      # UCD-SNMP-MIB: CPU (systemStats)
      - 1.3.6.1.4.1.2021.11
      # UCD-SNMP-MIB: Memory
      - 1.3.6.1.4.1.2021.4
    get:
      - 1.3.6.1.2.1.1.3.0   # sysUpTime.0
      - 1.3.6.1.2.1.1.5.0   # sysName.0
      # CPU
      - 1.3.6.1.4.1.2021.11.9.0    # ssCpuUser
      - 1.3.6.1.4.1.2021.11.10.0   # ssCpuSystem
      - 1.3.6.1.4.1.2021.11.11.0   # ssCpuIdle
      # Memory
      - 1.3.6.1.4.1.2021.4.5.0     # memTotalReal
      - 1.3.6.1.4.1.2021.4.6.0     # memAvailReal
      - 1.3.6.1.4.1.2021.4.14.0    # memBuffer
      - 1.3.6.1.4.1.2021.4.15.0    # memCached
    metrics:
      # --- System ---
      - name: synology_system_status
        oid: 1.3.6.1.4.1.6574.1.1.0
        type: gauge
        help: "System status (1=Normal, 2=Failed)"

      - name: synology_system_temperature
        oid: 1.3.6.1.4.1.6574.1.2.0
        type: gauge
        help: "System temperature (Celsius)"

      - name: synology_power_status
        oid: 1.3.6.1.4.1.6574.1.3.0
        type: gauge
        help: "Power status (1=Normal, 2=Failed)"

      - name: synology_system_fan_status
        oid: 1.3.6.1.4.1.6574.1.4.1.0
        type: gauge
        help: "System fan status (1=Normal, 2=Failed)"

      - name: synology_cpu_fan_status
        oid: 1.3.6.1.4.1.6574.1.4.2.0
        type: gauge
        help: "CPU fan status (1=Normal, 2=Failed)"

      # --- CPU (UCD-SNMP-MIB) ---
      - name: synology_cpu_user
        oid: 1.3.6.1.4.1.2021.11.9.0
        type: gauge
        help: "CPU user utilization (%)"

      - name: synology_cpu_system
        oid: 1.3.6.1.4.1.2021.11.10.0
        type: gauge
        help: "CPU system utilization (%)"

      - name: synology_cpu_idle
        oid: 1.3.6.1.4.1.2021.11.11.0
        type: gauge
        help: "CPU idle (%)"

      # --- Memory (UCD-SNMP-MIB, values in KB) ---
      - name: synology_memory_total
        oid: 1.3.6.1.4.1.2021.4.5.0
        type: gauge
        help: "Total physical memory (KB)"

      - name: synology_memory_available
        oid: 1.3.6.1.4.1.2021.4.6.0
        type: gauge
        help: "Available physical memory (KB)"

      - name: synology_memory_buffer
        oid: 1.3.6.1.4.1.2021.4.14.0
        type: gauge
        help: "Buffer memory (KB)"

      - name: synology_memory_cached
        oid: 1.3.6.1.4.1.2021.4.15.0
        type: gauge
        help: "Cached memory (KB)"

      # --- Disks ---
      - name: synology_disk_status
        oid: 1.3.6.1.4.1.6574.2.1.1.5
        type: gauge
        help: "Disk status (1=Normal, 2=Initialized, 3=NotInitialized, 4=SystemPartitionFailed, 5=Crashed)"
        indexes:
          - labelname: diskIndex
            type: Integer
        lookups:
          - labels: [diskIndex]
            labelname: diskID
            oid: 1.3.6.1.4.1.6574.2.1.1.2
            type: DisplayString
          - labels: [diskIndex]
            labelname: diskModel
            oid: 1.3.6.1.4.1.6574.2.1.1.3
            type: DisplayString

      - name: synology_disk_temperature
        oid: 1.3.6.1.4.1.6574.2.1.1.6
        type: gauge
        help: "Disk temperature (Celsius)"
        indexes:
          - labelname: diskIndex
            type: Integer
        lookups:
          - labels: [diskIndex]
            labelname: diskID
            oid: 1.3.6.1.4.1.6574.2.1.1.2
            type: DisplayString

      # --- RAID ---
      - name: synology_raid_status
        oid: 1.3.6.1.4.1.6574.3.1.1.3
        type: gauge
        help: "RAID status (1=Normal, 2=Repairing, 3=Migrating, 4=Expanding, 5=Deleting, 6=Creating, 7=RaidSyncing, 8=RaidParityChecking, 9=RaidAssembling, 10=Canceling, 11=Degrade, 12=Crashed, 13=DataScrubbing, 14=RaidDeploying, 15=RaidUnDeploying, 16=RaidMountCache, 17=RaidUnmountCache, 18=RaidExpandingUnfinishedSHR, 19=RaidConvertSHRToPool, 20=RaidMigrateSHR1ToSHR2, 21=RaidUnknownStatus)"
        indexes:
          - labelname: raidIndex
            type: Integer
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString

      - name: synology_raid_free_size
        oid: 1.3.6.1.4.1.6574.3.1.1.4
        type: gauge
        help: "RAID free size (bytes)"
        indexes:
          - labelname: raidIndex
            type: Integer
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString

      - name: synology_raid_total_size
        oid: 1.3.6.1.4.1.6574.3.1.1.5
        type: gauge
        help: "RAID total size (bytes)"
        indexes:
          - labelname: raidIndex
            type: Integer
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString

      # --- Storage I/O ---
      - name: synology_storageio_reads
        oid: 1.3.6.1.4.1.6574.101.1.1.5
        type: counter
        help: "Number of read accesses"
        indexes:
          - labelname: storageioIndex
            type: Integer
        lookups:
          - labels: [storageioIndex]
            labelname: storageioDevice
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      - name: synology_storageio_writes
        oid: 1.3.6.1.4.1.6574.101.1.1.6
        type: counter
        help: "Number of write accesses"
        indexes:
          - labelname: storageioIndex
            type: Integer
        lookups:
          - labels: [storageioIndex]
            labelname: storageioDevice
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      - name: synology_storageio_load
        oid: 1.3.6.1.4.1.6574.101.1.1.8
        type: gauge
        help: "Storage I/O load (1-100)"
        indexes:
          - labelname: storageioIndex
            type: Integer
        lookups:
          - labels: [storageioIndex]
            labelname: storageioDevice
            oid: 1.3.6.1.4.1.6574.101.1.1.2
            type: DisplayString

      # --- Network (standard IF-MIB) ---
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Total bytes received
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Total bytes sent
        indexes:
          - labelname: ifIndex
            type: Integer
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString

  # =========================================================================
  # TP-Link tpSysMonitor: CPU/Memory 시스템 메트릭
  # 대상: TP-Link SG2218
  # MIB: tpSysMonitor (1.3.6.1.4.1.11863.6.4)
  # =========================================================================
  tp_system:
    walk:
      - 1.3.6.1.4.1.11863.6.4   # tpSysMonitor
    metrics:
      - name: tplink_cpu_5s
        oid: 1.3.6.1.4.1.11863.6.4.1.1.1.1.2.1
        type: gauge
        help: "CPU utilization (%, 5-second average)"

      - name: tplink_cpu_1m
        oid: 1.3.6.1.4.1.11863.6.4.1.1.1.1.3.1
        type: gauge
        help: "CPU utilization (%, 1-minute average)"

      - name: tplink_cpu_5m
        oid: 1.3.6.1.4.1.11863.6.4.1.1.1.1.4.1
        type: gauge
        help: "CPU utilization (%, 5-minute average)"

      - name: tplink_memory_usage
        oid: 1.3.6.1.4.1.11863.6.4.1.2.1.1.2.1
        type: gauge
        help: "Memory utilization (%)"
