# =============================================================================
# Promtail Configuration - Syslog Receiver
# OPNsense, ESXi, Synology NAS로부터 syslog 수신
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576  # 1MB
    tenant_id: ""

scrape_configs:
  # =========================================================================
  # Syslog Receiver (TCP) - 주요 수신 채널
  # =========================================================================
  - job_name: syslog_tcp
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: tcp
      idle_timeout: 60s
      label_structured_data: true
      labels:
        job: "syslog"
        transport: "tcp"
    relabel_configs:
      # syslog source IP → host 레이블
      - source_labels: ["__syslog_connection_ip_address"]
        target_label: "host_ip"
      # syslog hostname → host 레이블
      - source_labels: ["__syslog_message_hostname"]
        target_label: "host"
      # syslog facility → facility 레이블
      - source_labels: ["__syslog_message_facility"]
        target_label: "facility"
      # syslog severity → severity 레이블
      - source_labels: ["__syslog_message_severity"]
        target_label: "severity"
      # syslog app name → app 레이블
      - source_labels: ["__syslog_message_app_name"]
        target_label: "app"
    pipeline_stages:
      # IP 기반으로 device_type 레이블 추가
      - match:
          selector: '{host_ip=~"<FIREWALL_IP_1>|<FIREWALL_IP_2>|<FIREWALL_IP_3>"}'  # 방화벽 IP로 교체
          stages:
            - labels:
                device_type: ""
            - template:
                source: device_type
                template: "firewall"
            - labels:
                device_type:
      - match:
          selector: '{host_ip=~"<ESXI_IP_PATTERN>"}'  # ESXi 호스트 IP 패턴으로 교체
          stages:
            - labels:
                device_type: ""
            - template:
                source: device_type
                template: "esxi"
            - labels:
                device_type:
      - match:
          selector: '{host_ip="<NAS_IP>"}'  # NAS IP로 교체
          stages:
            - labels:
                device_type: ""
            - template:
                source: device_type
                template: "nas"
            - labels:
                device_type:

  # =========================================================================
  # Syslog Receiver (TCP:1515) - rsyslog 릴레이 경유 ESXi 로그
  # ESXi (RFC 3164) → rsyslog (RFC 5424 변환) → Promtail
  # =========================================================================
  - job_name: syslog_esxi
    syslog:
      listen_address: 0.0.0.0:1515
      listen_protocol: tcp
      idle_timeout: 60s
      label_structured_data: true
      labels:
        job: "syslog"
        device_type: "esxi"
    relabel_configs:
      - source_labels: ["__syslog_message_hostname"]
        target_label: "host"
      - source_labels: ["__syslog_message_facility"]
        target_label: "facility"
      - source_labels: ["__syslog_message_severity"]
        target_label: "severity"
      - source_labels: ["__syslog_message_app_name"]
        target_label: "app"
